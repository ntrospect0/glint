[package]
name = "glint-tui"
version = "0.1.0"
edition = "2021"
description = "A fast, extensible terminal dashboard for stocks, calendar, news, and beyond"
license = "MIT"
repository = "https://github.com/ntrospect0/glint"
keywords = ["tui", "dashboard", "terminal", "stocks", "ratatui"]
categories = ["command-line-interface"]

[dependencies]
# TUI
ratatui = "0.28"
crossterm = { version = "0.28", features = ["event-stream"] }

# Async
tokio = { version = "1", features = ["full"] }

# HTTP & serialization
reqwest = { version = "0.12", features = ["json", "cookies"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Date/time
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.9"

# Utilities
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
open = "5"
urlencoding = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
strsim = "0.11"
notify = "6"
dirs = "5"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
wiremock = "0.6"
tokio-test = "0.4"
