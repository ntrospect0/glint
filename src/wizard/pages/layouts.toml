# Layout presets surfaced by the wizard's Layout page.
#
# Each `[[presets]]` block defines one named layout the user can pick
# when seeding their dashboard. Embedded into the binary at build
# time via `include_str!` and parsed once at first wizard step.
# Editing requires a rebuild; adding a new layout is one new block.
#
# Fields:
#   id           вҖ” stable slug used in commit telemetry.
#   label        вҖ” header shown on the preset list.
#   description  вҖ” one-line explainer rendered next to the label.
#   cells        вҖ” total number of cells the layout produces.
#   grid_cols    вҖ” width of the grid the Assign page renders against.
#   grid_rows    вҖ” height of that grid.
#   ascii        вҖ” multi-line preview painted on the picker.
#   grid_def     вҖ” `[col, row, col_span, row_span]` per cell, in
#                  registration order. Cell 0 in this array maps to
#                  `assignments[0]` on the Assign page.

[[presets]]
id = "single"
label = "Single pane (full screen)"
description = "One widget filling the entire terminal. Useful for a focused tool view."
cells = 1
grid_cols = 1
grid_rows = 1
ascii = [
  "в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ",
  "в”Ӯ              в”Ӯ",
  "в”Ӯ              в”Ӯ",
  "в”Ӯ              в”Ӯ",
  "в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ",
]
grid_def = [
  [0, 0, 1, 1],
]

